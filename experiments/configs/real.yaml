tickers: [SPY, QQQ, AAPL, MSFT, JPM, EURUSD=X, GBPUSD=X, BTC-USD, ETH-USD]
start: "2018-01-01"
end: "2025-12-31"

p: 5
train_frac: 0.7
n_splits: 5
train_size: 1000
test_size: 200

filters:
  F0: {kind: identity}
  F1: {kind: ma, window: 5}
  F2: {kind: kalman, process_var: 1.0e-4, obs_var: 1.0}
  F3: {kind: wavelet, wavelet: db4, mode: soft, threshold: universal}
  F4: {kind: median, window: 5}

optimizers:
  sgd: {lr: 1.0e-2, weight_decay: 0.0}
  adam: {lr: 1.0e-2, weight_decay: 0.0}
  adamw: {lr: 1.0e-2, weight_decay: 1.0e-4}

run:
  steps: 1500
  buffer_size: 24
  batch_size: 64
  n_seeds: 5
  noise_scale: 0.0
  epsilon: 1.0e-3
